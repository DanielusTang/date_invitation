<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #ff7ab6 0%, #ff4f93 45%, #ff2f7c 100%);
            font-family: "JetBrains Mono", sans-serif;
            padding: 1rem;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #c2185b;
            text-align: center;
            font-size: clamp(1.3rem, 4vw, 2rem);
        }

        img {
            width: min(90vw, 420px);
            height: auto;
            border-radius: 0.8rem;
            display: block;
        }
    </style>
</head>
<body>
<main>
    <h1>Yay! See you at Boot Dance!💕</h1>
    <img src="./img/cutegif.gif" alt="Cute celebration gif">
</main>
</body>
</html>
